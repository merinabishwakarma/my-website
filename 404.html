<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Ganga Bishwakarma</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <meta name="theme-color" content="#C9A84C">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,700;1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAF7F2; --charcoal: #2A2A2A;
      --gold: #C9A84C; --gold-lite: rgba(201,168,76,0.10);
      --gold-border: rgba(201,168,76,0.28); --muted: #9A9A9A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg); color: var(--charcoal);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 40px 24px;
    }
    .container { max-width: 480px; width: 100%; }
    .num {
      font-family: 'Playfair Display', serif;
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 700; color: var(--gold);
      opacity: .18; line-height: 1; margin-bottom: -20px;
      letter-spacing: -8px;
    }
    .icon {
      font-size: 3.5rem; margin-bottom: 16px;
    }
    .sig {
      font-family: 'Great Vibes', cursive;
      font-size: 2rem; color: var(--gold); opacity: .75;
      margin-bottom: 20px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem; margin-bottom: 14px;
    }
    p {
      font-size: .9rem; color: #666;
      line-height: 1.7; margin-bottom: 32px;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--charcoal); color: #fff;
      text-decoration: none; padding: 13px 28px;
      border-radius: 8px; font-weight: 600; font-size: .87rem;
      transition: background .25s, transform .2s;
    }
    .btn:hover { background: var(--gold); color: var(--charcoal); transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <div class="num">404</div>
    <div class="icon">🌸</div>
    <div class="sig">oops, lost in the journey</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or may have been moved. Let's take you back home.</p>
    <a href="/" class="btn">← Back to Home</a>
  </div>
</body>
</html>
